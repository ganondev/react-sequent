name: Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  verify:
    name: Verify (tests, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable && corepack prepare yarn@stable --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Run unit tests
        run: yarn test:unit

      - name: Run BDD tests
        run: yarn test:bdd

      - name: Build
        run: yarn build

      - name: Create npm package tarball
        run: npm pack

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.tgz'

  publish:
    name: Publish & attach release asset
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js (publish)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: package
          path: .

      - name: Publish tarball to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          tgz=$(ls *.tgz | head -n1)
          version=$(tar -xOf "$tgz" package/package.json | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version)")
          if echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-'; then
            tag=$(echo "$version" | sed 's/^[0-9]*\.[0-9]*\.[0-9]*-\([a-zA-Z][a-zA-Z0-9]*\).*/\1/')
            echo "Prerelease version '$version' detected — publishing with --tag $tag"
            npm publish "$tgz" --access public --tag "$tag"
          else
            echo "Stable version '$version' detected — publishing with default (latest) tag"
            npm publish "$tgz" --access public
          fi

      - name: Attach tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'