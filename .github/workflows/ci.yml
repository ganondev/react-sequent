name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

  test:
    name: Test (React ${{ matrix.react-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - react-version: '16.14.0'
            testing-library-react-version: '12.1.5'
          - react-version: '17'
            testing-library-react-version: '12.1.5'
          - react-version: '18'
            testing-library-react-version: '16.3.2'
          - react-version: '19'
            testing-library-react-version: '16.3.2'
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install React ${{ matrix.react-version }} test dependencies
        run: yarn add --dev react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }} @testing-library/react@${{ matrix.testing-library-react-version }}

      - name: Unit tests
        run: yarn test:unit

      - name: BDD tests
        run: yarn test:bdd

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            docs/yarn.lock

      - name: Install root dependencies
        run: yarn install --immutable

      - name: Build react-sequent
        run: yarn build

      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Build docs
        working-directory: docs
        run: yarn build
